# PayCraft Test Matrix — per-project state file
# Schema Version: 2.0
# Auto-managed by /paycraft-adopt [T] Test scenarios.
# DO NOT edit manually. DO NOT commit — contains test emails and device tokens.
# Gitignore: .paycraft/paycraft-matrix.yaml

schema_version: "2.0"
project: "{project_name}"
last_updated: null  # ISO8601 — updated on every write

# ── Matrix state cache ────────────────────────────────────────────────────────
# Claude reads scanned_at, computes (now - scanned_at) in minutes.
# If < 10 → use cache (skip live scan). If >= 10 or null → re-scan and update.
# ENV gate: always live (file read is fast, never cached).
# MEMORY gate: always live (file read, never cached).
# SUPABASE / CLIENT / OAUTH: cached with 10-minute TTL.
matrix_state:
  env:
    status: ok              # ok | partial | missing
    scanned_at: null        # ISO8601 — null = never scanned (always live, no TTL)
    keys_present: 0
    keys_missing: []
  supabase:
    status: ok              # ok | partial | missing | error
    scanned_at: null        # ISO8601 — null = never scanned
    migrations_applied: []  # e.g. ["001_create_subscriptions", "009_device_id"]
    migrations_missing: []
    edge_functions: {}      # e.g. {stripe-webhook: ACTIVE, otp-send-hook: ACTIVE}
    device_id_column: false # true = registered_devices.device_id column exists (migration 009)
  client:
    status: ok              # ok | partial | missing | error
    scanned_at: null        # ISO8601 — null = never scanned
    paycraft_version: null  # e.g. "1.3.0"
    configure_found: false
    koin_module_found: false
    banner_found: false
    lifecycle_refresh_found: false
    device_conflict_ui_found: false
  oauth:
    status: ok              # ok | partial | missing | error
    scanned_at: null        # ISO8601 — null = never scanned
    google_enabled: false
    apple_enabled: false

