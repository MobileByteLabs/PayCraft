name: Deploy paywall preview bundle

on:
  push:
    branches: [main, development]
    paths:
      - "cmp-paycraft/**"
      - "dashboard/components/paywall/preview-iframe-deploy/**"
      - ".github/workflows/deploy-paywall-preview.yml"
  workflow_dispatch:
    inputs:
      production:
        description: "Promote to production paywall-preview.paycraft.mobilebytesensei.com (default: branch preview)"
        required: false
        default: "false"

# Single-flight per branch so we don't race two deploys on rapid pushes.
concurrency:
  group: deploy-paywall-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build cmp-paycraft Kotlin/JS preview bundle
        run: ./gradlew :cmp-paycraft:preview-js:jsBrowserDistribution --no-daemon

      - name: Verify bundle output exists
        run: |
          test -d cmp-paycraft/preview-js/build/dist/js/productionExecutable \
            || (echo "::error::Kotlin/JS bundle not at expected path"; exit 1)
          ls -la cmp-paycraft/preview-js/build/dist/js/productionExecutable | head -20

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a4ee76f3d0dc36d7cf7350c01d39d526
          # Production deploys (main branch or manual workflow_dispatch with production=true)
          # go to https://paywall-preview.paycraft.mobilebytesensei.com.
          # Branch deploys produce a per-branch preview URL on Cloudflare Pages.
          command: >
            pages deploy
            cmp-paycraft/preview-js/build/dist/js/productionExecutable
            --project-name=paycraft-paywall-preview
            ${{ (github.ref == 'refs/heads/main' || github.event.inputs.production == 'true') && '--branch=main' || format('--branch={0}', github.head_ref || github.ref_name) }}
