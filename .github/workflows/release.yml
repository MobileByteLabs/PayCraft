# PayCraft Release Workflow
#
# Triggered when a version tag (v*.*.*) is pushed.
# Runs the full quality gate, then creates a GitHub Release.
# After release: trigger Maven Central publish manually via Actions → Publish → Run workflow.
#
# How to trigger:
#   scripts/release.sh          ← recommended (runs checks locally first)
#   git tag v1.0.0 && git push origin v1.0.0   ← manual

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-release: v1.0.0-beta.1

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  # ── Gate 1: Code Quality ────────────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Detekt
        run: ./gradlew detekt

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-report
          path: build/reports/detekt/

  # ── Gate 2: Tests ───────────────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.name }})
    needs: quality
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: JVM
            target: jvmTest
            os: ubuntu-latest
          - name: iOS Simulator
            target: iosSimulatorArm64Test
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ${{ matrix.name }} tests
        run: ./gradlew ${{ matrix.target }}

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-${{ matrix.name }}
          path: |
            **/build/reports/tests/
            **/build/test-results/

  # ── Gate 3: Build all targets ───────────────────────────────────────────────
  build:
    name: Build All Targets
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble library (all targets)
        run: ./gradlew :cmp-paycraft:assemble

  # ── Create GitHub Release (triggers publish.yml automatically) ───────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PayCraft ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## PayCraft ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.log }}

            ### Installation
            ```toml
            [versions]
            paycraft = "${{ steps.version.outputs.version }}"

            [libraries]
            paycraft = { module = "io.github.mobilebytelabs:paycraft", version.ref = "paycraft" }
            ```

            ```kotlin
            commonMain.dependencies {
                implementation(libs.paycraft)
            }
            ```

            ### What's next
            Maven Central publishing will complete within ~10 minutes (see the Publish workflow).
