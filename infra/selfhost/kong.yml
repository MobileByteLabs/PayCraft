_format_version: "3.0"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths: ["/auth/v1/"]
    plugins:
      - name: cors

  - name: rest-v1
    # Self-host customers point at their own postgrest/postgresql gateway here
    # (or run supabase/postgrest as another service in this compose)
    url: http://db:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths: ["/rest/v1/"]

  - name: functions-v1
    url: http://edge-runtime:9000/
    routes:
      - name: functions-v1-all
        strip_path: true
        paths: ["/functions/v1/"]
