# Apple/StoreKit entitlement device-truth on Android (D14, AC8) — state + restore + cancel/manage.
#
# Server-authoritative Apple entitlement resolves on Android via a stable app-user-id (D5/D7):
# the sample-app seeds the reconciled Premium record into the REAL PayCraftStore cache from the
# launchApp arguments, so PayCraftBillingManager.init renders it through the genuine cache-first
# path (applyCachedStatus -> BillingState.Premium, D6/D8 offline last-known-good) — not a stub.
#
# stopApp is the sanctioned fresh-capture force-stop (this OnePlus/ColorOS device denies pm clear;
# RULE-IMPL-BEHAVIOR-EXECUTED-001).
#
# Run: maestro test maestro/paycraft_storekit_android_flow.yaml
# Prereq: ./gradlew :sample-app:installDebug on the connected Android device.
appId: com.mobilebytelabs.paycraft.sample
---
# --- Fresh capture after force-stop ---
- stopApp
- launchApp:
    arguments:
      paycraft_provider: apple_storekit
      paycraft_user_id: e2e-storekit-android-01

# --- State-accuracy: canonical label reflects the reconciled entitlement (incl. grace=active) ---
- extendedWaitUntil:
    visible:
      id: "billing_state_label"
      text: "Premium"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "billing_provider"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "billing_provider"
    text: "apple_storekit"
- assertVisible:
    id: "billing_will_renew"
    text: "true"

# --- Cancel/manage dispatch (D7): the Premium banner's manage CTA is reachable + non-crashing ---
- scrollUntilVisible:
    element:
      id: "paycraft_banner_premium"
    direction: UP
    timeout: 10000
- assertVisible:
    id: "paycraft_banner_manage_button"
- tapOn:
    id: "paycraft_banner_manage_button"
- assertNotVisible: "Application Error"
# manage CTA opens PayCraftSheet (onManageClick -> showPaywall=true); dismiss before re-opening explicitly.
- tapOn: "Close paywall"

# --- Paywall render (E6 paywall-coverage): the always-visible "Open Paywall" control mounts
#     PayCraftSheet -> PayCraftPaywallSheet -> koinViewModel<PayCraftPaywallViewModel>(). A Koin/IR
#     linkage crash on ViewModel resolution (the koin 4.0.2 IrLinkageError class, fixed by koin 4.1.0)
#     kills the app here and fails every assert below. Premium is seeded, so the paywall resolves the
#     Premium state: "Your Premium" title + "Premium Active" banner (device-verified render). ---
- scrollUntilVisible:
    element: "Open Paywall"
    direction: DOWN
    timeout: 10000
- tapOn: "Open Paywall"
- assertVisible: "Your Premium"
- assertVisible: "Premium Active"
- assertNotVisible: "Application Error"
- tapOn: "Close paywall"

# --- Restore (D7/D6): cache-first offline restore re-activates Premium after a cold force-stop
#     relaunch WITH NO re-seed — the last-known-good entitlement survives process death. ---
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: "billing_state_label"
      text: "Premium"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "billing_provider"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "billing_provider"
    text: "apple_storekit"
- assertNotVisible: "Application Error"
