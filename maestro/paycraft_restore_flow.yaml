# PayCraft v2 restore-premium flow (sub-plan 03 T6, AC-16 companion).
#
# Exercises PayCraftRestore (the Koin-injected restore sheet that unit tests
# defer to e2e — see PayCraftRestoreContentTest.kt KDoc). Targets the in-repo
# sample-app showcase; see paycraft_branded_flow.yaml for the reels-downloader
# deviation rationale.
#
# Run: maestro test maestro/paycraft_restore_flow.yaml

appId: com.mobilebytelabs.paycraft.sample
---
- launchApp:
    clearState: true

- assertVisible: "Upgrade to Premium"

# Open the restore sheet from the paywall footer.
- tapOn:
    text: "RESTORE.*"
    regex: true

# Restore sheet renders its email gate (DTO restore_label drives the heading).
- assertVisible:
    text: "Restore.*Premium"
    regex: true
- assertVisible:
    id: "paycraft_email_text_field"

# Enter an email and confirm the restore CTA enables.
- tapOn:
    id: "paycraft_email_text_field"
- inputText: "tester@example.com"
- hideKeyboard

- assertNotVisible: "Application Error"
