# PayCraft v2 branded-stack paywall — end-to-end flow (sub-plan 03 T6, AC-16).
#
# Drives the full branded flow on the in-repo sample-app showcase
# (com.mobilebytelabs.paycraft.sample): the Settings-screen PayCraftPremiumBanner
# (sub-plan 03 T1) -> Get Premium -> BrandedStackTemplate paywall modal
# (sub-plan 02) -> plan select -> Continue. Supersedes the plan's reels-downloader
# target (an external consumer workspace not buildable from this repo); the
# sample-app is the canonical in-repo branded-flow showcase and runs on-device.
#
# Run: maestro test maestro/paycraft_branded_flow.yaml
# Prereq: ./gradlew :sample-app:installDebug on a connected device/emulator.
#
# This device (OnePlus/ColorOS) denies `pm clear` to the shell, so instead of
# clearState we cold-start via stopApp (force-stop IS permitted).

appId: com.mobilebytelabs.paycraft.sample
---
- stopApp
- launchApp

# Home: the PayCraftPremiumBanner renders its DTO-driven copy + CTAs.
- assertVisible: "Upgrade to Premium"
- assertVisible: "Get Premium"
- assertVisible: "Restore Your Premium"

# Open the BrandedStackTemplate paywall modal.
- tapOn: "Get Premium"

# Plan stack renders (config loads async on first open — wait for it).
- extendedWaitUntil:
    visible: "Monthly"
    timeout: 15000
- assertVisible: "Quarterly"
- assertVisible: "Yearly"
- assertVisible: "Continue"

# Footer restore affordance from the v2 DTO (scroll into view if below the fold).
- scrollUntilVisible:
    element:
      text: "RESTORE"
    direction: DOWN
    optional: true

# Select a plan and drive the primary CTA — must not crash.
- tapOn: "Yearly"
- tapOn: "Continue"
- assertNotVisible: "Application Error"
