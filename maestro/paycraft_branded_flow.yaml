# PayCraft v2 branded-stack paywall — end-to-end flow (sub-plan 03 T6, AC-16).
#
# Target: the in-repo sample-app showcase (com.mobilebytelabs.paycraft.sample),
# which renders the BrandedStackTemplate paywall via PayCraftBackend.Mock. This
# supersedes the plan's original reels-downloader target — reels-downloader is an
# external consumer workspace not buildable from this repo, whereas sample-app is
# the canonical in-repo branded-flow showcase and runs on the connected device.
#
# Run: maestro test maestro/paycraft_branded_flow.yaml
# Prereq: ./gradlew :sample-app:installDebug on a connected device/emulator.

appId: com.mobilebytelabs.paycraft.sample
---
- launchApp:
    clearState: true

# Branded paywall renders with DTO-driven hero copy + plan stack + CTA + footer.
- assertVisible: "Upgrade to Premium"
- assertVisible: "Monthly"
- assertVisible: "Quarterly"
- assertVisible: "Yearly"
- assertVisible: "Continue"

# Footer links from the v2 DTO (restore_label / terms / privacy).
- assertVisible:
    text: "RESTORE.*"
    regex: true

# Select a plan, then drive the primary CTA.
- tapOn: "Yearly"
- tapOn: "Continue"

# After Continue the SDK hands off to the mock checkout; the paywall either
# advances or surfaces the checkout sheet. Assert we left the initial state
# cleanly (no crash dialog).
- assertNotVisible: "Application Error"
